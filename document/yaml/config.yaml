addr: "192.168.3.125" 
name: "sccsmsserver"
mode: "release"
port: 10120
start_time: "2023-01-01"
machine_id: 101
tls: false
certificatefile: "cert.pem"
privatekeyfile: "key.pem"
userlockth: 5
iplockth: 10
iplockedminutes: 15

log:
  level: "debug"
  filename: "sccsmsserver.log"
  max_size: 200
  max_age: 30
  max_backups: 7

