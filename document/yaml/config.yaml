  password: "password"
  max_open_conns: 200
  max_idle_conns: 50
  max_record: 5000

s3storage:
  endpoint: "http://192.168.3.125:9000"
  accesskeyid: "minioadmin"
  secretaccesskey: "password"
  secure: false
  selfsigned: false
  defaultbucket: "seacloud"
  location: "ap-guangzhou"

redis:
  enabled: false
  host: "127.0.0.1"
  port: 6379
  db: 0
  password: "password"
  pool_size: 100